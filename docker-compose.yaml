services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: course-rep-frontend-1
    expose:
      - "80" 
    environment:
      - NODE_ENV=production
    env_file:
      - .env.prod
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - web
    labels:
      com.datadoghq.ad.logs: '[{"source":"nginx","service":"course-rep-frontend"}]'

networks:
  web:
    external: true
